<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Palette Generator — Light & Dark</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Color Palette Generator</h1>
    <p>Escala 100–900 com paletas separadas para light e dark mode.</p>
  </header>

  <main>
    <!-- Controls -->
    <section class="controls">
      <div class="control-row">
        <div class="field">
          <label for="bc">Cor base</label>
          <input type="color" id="bc" value="#5B6AF5">
        </div>
        <div class="field">
          <label for="hx">Hex</label>
          <input type="text" id="hx" value="#5B6AF5" placeholder="#000000" maxlength="7">
        </div>
        <div class="field actions">
          <button class="btn-primary" onclick="gen()">Gerar paleta</button>
          <button class="btn-secondary" onclick="rnd()">Aleatória</button>
        </div>
      </div>
    </section>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="tab('scale',this)">Escala</button>
      <button class="tab" onclick="tab('tokens',this)">Tokens</button>
      <button class="tab" onclick="tab('preview',this)">Pré-visualização</button>
      <button class="tab" onclick="tab('export',this)">Exportar</button>
    </div>

    <!-- Tab: Escala -->
    <section id="t-scale" class="tab-content">
      <div style="display:flex;flex-direction:column;gap:16px;margin-bottom:24px;">
        <div id="band-light"></div>
        <div id="band-dark"></div>
      </div>
      <div class="two-col">
        <div id="scale-light"></div>
        <div id="scale-dark"></div>
      </div>
    </section>

    <!-- Tab: Tokens -->
    <section id="t-tokens" class="tab-content hidden">
      <div class="two-col">
        <div>
          <div class="mode-title">☀️ Light mode — tokens semânticos</div>
          <div class="token-frame" id="lt-frame"></div>
        </div>
        <div>
          <div class="mode-title">🌙 Dark mode — tokens semânticos</div>
          <div class="token-frame" id="dk-frame"></div>
        </div>
      </div>
    </section>

    <!-- Tab: Preview -->
    <section id="t-preview" class="tab-content hidden">
      <div class="two-col" id="preview-grid"></div>
    </section>

    <!-- Tab: Export -->
    <section id="t-export" class="tab-content hidden">
      <div class="export-actions">
        <button class="btn-secondary" onclick="exp('css')">CSS variables</button>
        <button class="btn-secondary" onclick="exp('tailwind')">Tailwind</button>
        <button class="btn-secondary" onclick="exp('json')">JSON</button>
        <button class="btn-secondary" onclick="exp('figma')">Figma tokens</button>
      </div>
      <pre class="export-area" id="exp-area">Escolha um formato acima.</pre>
      <button class="btn-secondary" style="margin-top:8px" onclick="copyExport()">Copiar código</button>
    </section>
  </main>

  <div class="toast" id="toast"></div>
  <script src="palette.js"></script>
</body>
</html>
